[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "openleads"
version = "0.1.0"
description = "A free, open-source Apollo alternative: find tech founders and verify their emails using only free, public data sources."
readme = "README.md"
requires-python = ">=3.8"
license = { text = "PolyForm-Noncommercial-1.0.0" }
authors = [{ name = "Samyar Shafiee" }]
keywords = [
  "lead-generation", "email-finder", "apollo-alternative", "sales",
  "prospecting", "cold-email", "smtp-verification", "yc", "founders", "osint",
]
classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Developers",
  "Programming Language :: Python :: 3",
  "Topic :: Office/Business",
  "Operating System :: OS Independent",
]
dependencies = []  # core engine is stdlib-only

[project.optional-dependencies]
campaign = ["requests>=2.31.0", "python-dotenv>=1.0.0"]
dev = ["pytest>=7.0", "ruff>=0.4.0"]

[project.urls]
Homepage = "https://github.com/Samyrrrrrr990/openleads"
Repository = "https://github.com/Samyrrrrrr990/openleads"
Issues = "https://github.com/Samyrrrrrr990/openleads/issues"

[project.scripts]
openleads = "lead_engine:main"

[tool.setuptools]
py-modules = ["lead_engine"]

[tool.ruff]
line-length = 110
target-version = "py38"
