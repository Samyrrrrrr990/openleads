name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.10", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package (zero-dep core) + test tools
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest ruff

      - name: Lint (critical errors only)
        run: ruff check --select E9,F63,F7,F82 .

      - name: Run tests
        run: pytest -q

      - name: Smoke-test the CLI (zero-dependency core)
        run: |
          python -c "import openleads; print('openleads', openleads.__version__, 'imports with stdlib only')"
          openleads --version
          openleads sources
